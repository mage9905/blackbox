<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>黑箱神器</title>
    <style>
        body { background: #0b0e17; color: #e0e5f0; font-family: monospace; padding: 2rem; }
        .container { max-width: 600px; margin: auto; background: #1a1b26; padding: 2rem; border-radius: 16px; }
        input, button { width: 100%; margin: 0.5rem 0; padding: 0.5rem; background: #2a2c3a; border: 1px solid #2a7faa; color: white; }
        button { background: #2a7faa; cursor: pointer; }
        .result { white-space: pre-wrap; background: #0f0f1a; padding: 1rem; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚫ 黑箱神器</h1>
    <form id="form">
        <label>主队</label><input id="home" required>
        <label>客队</label><input id="away" required>
        <label>伤停（可选）</label><input id="injuries">
        <button type="submit">🔮 预测</button>
    </form>
    <div id="result" class="result">等待输入...</div>
</div>
<script>
    document.getElementById('form').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            home: document.getElementById('home').value,
            away: document.getElementById('away').value,
            injuries: document.getElementById('injuries').value
        };
        const res = await fetch('/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const json = await res.json();
        document.getElementById('result').innerHTML = JSON.stringify(json, null, 2);
    };
</script>
</body>
</html>
